  <script>

  <script>
    function runMasonry() {
      const gallery = document.querySelector('.gallery');
      const items = Array.from(gallery.querySelectorAll('.gallery-item'));
      const isMobile = window.innerWidth <= 768;
      const gap = isMobile ? 8 : 12;

      let cols = 3;
      const isLandscape = window.innerWidth > window.innerHeight;
      if (window.innerWidth <= 768 && !isLandscape) cols = 1;
      else if (window.innerWidth <= 768 && isLandscape) cols = 2;
      else if (window.innerWidth <= 900) cols = 2;

      const colWidth = (gallery.offsetWidth - gap * (cols - 1)) / cols;
      const colHeights = Array(cols).fill(0);

      gallery.style.position = 'relative';

      items.forEach(item => {
        // Force correct width before measuring height
        item.style.position = 'absolute';
        item.style.width = colWidth + 'px';
        const shortest = colHeights.indexOf(Math.min(...colHeights));
        item.style.left = (shortest * (colWidth + gap)) + 'px';
        item.style.top = colHeights[shortest] + 'px';
        colHeights[shortest] += item.offsetHeight + gap;
      });

      gallery.style.height = Math.max(...colHeights) + 'px';
    }

    // Wait for all images to load before laying out
    const imgs = Array.from(document.querySelectorAll('.gallery-item img'));
    let loaded = 0;
    function onLoad() {
      loaded++;
      if (loaded === imgs.length) runMasonry();
    }
    imgs.forEach(img => {
      if (img.complete) onLoad();
      else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad); }
    });

    // Debounce resize so masonry waits for the browser to fully reflow
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(runMasonry, 150);
    });
  </script>
